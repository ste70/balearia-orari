name: Fetch Orari Balearia

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Fetch orari con Playwright
        run: |
          python3 << 'PYEOF'
          import json, time
          from datetime import datetime, timedelta
          from playwright.sync_api import sync_playwright

          dates = [(datetime.today() + timedelta(days=i)).strftime('%d/%m/%Y') for i in range(7)]
          result = {'lastUpdate': datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S'), 'days': {}}

          with sync_playwright() as p:
              browser = p.chromium.launch(
                  headless=True,
                  args=['--no-sandbox', '--disable-blink-features=AutomationControlled']
              )
              context = browser.new_context(
                  user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
                  locale='es-ES',
                  viewport={'width': 1280, 'height': 800},
                  extra_http_headers={
                      'Accept-Language': 'es-ES,es;q=0.9',
                  }
              )

              # Rimuovi flag webdriver
              context.add_init_script("""
                  Object.defineProperty(navigator, 'webdriver', { get: () => undefined });
              """)

              page = context.new_page()

              for date in dates:
                  print(f'Fetching {date}...')
                  captured = {}

                  def on_response(response):
                      if 'hexagonal/horarios' in response.url:
                          print(f'  Intercettata API: {response.url} -> HTTP {response.status}')
                          if response.status == 200:
                              try:
                                  captured['data'] = response.json()
                              except Exception as e:
                                  print(f'  JSON parse error: {e}')

                  page.on('response', on_response)

                  # Naviga la pagina reale con la data nel URL
                  d, m, y = date.split('/')
                  url = f'https://www.balearia.com/es/horarios-ibiza-formentera?fechaIda={y}-{m}-{d}'
                  print(f'  Navigating: {url}')

                  try:
                      page.goto(url, wait_until='networkidle', timeout=45000)
                  except Exception as e:
                      print(f'  Timeout/error: {e}')

                  time.sleep(4)

                  if 'data' in captured:
                      result['days'][date] = captured['data']
                      ida = len((captured['data'].get('horariosIda') or [{}])[0].get('horarios', []))
                      print(f'  OK: {date} - {ida} corse andata')
                  else:
                      print(f'  FAIL: nessuna API intercettata per {date}')

                  page.remove_listener('response', on_response)
                  time.sleep(2)

              browser.close()

          with open('orari.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          giorni = len(result['days'])
          print(f'Salvato orari.json con {giorni} giorni')
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
